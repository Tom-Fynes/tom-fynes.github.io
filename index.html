<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tom Fynes — Moved</title>
    <meta http-equiv="refresh" content="5;url=https://fynes-forge.github.io" />
    <link rel="canonical" href="https://fynes-forge.github.io" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #252e36;
        color: #b7c3f3;
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        text-align: center;
        max-width: 480px;
        width: 100%;
      }
      .mark {
        margin: 0 auto 32px;
        display: block;
      }
      h1 {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: #4f6272;
        margin-bottom: 24px;
      }
      p {
        font-size: 16px;
        line-height: 1.7;
        color: #b7c3f3;
        margin-bottom: 8px;
      }
      .url {
        font-family: "Courier New", monospace;
        font-size: 14px;
        color: #ecda90;
        margin-bottom: 32px;
        display: block;
      }
      .progress-wrap {
        height: 2px;
        background: #404e5c;
        border-radius: 1px;
        margin-bottom: 32px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #d05786, #ecda90, #63c5ea);
        border-radius: 1px;
        animation: fill 5s linear forwards;
      }
      @keyframes fill {
        from {
          width: 0%;
        }
        to {
          width: 100%;
        }
      }
      .btn {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-decoration: none;
        color: #1c2329;
        background: #dd7596;
        padding: 12px 28px;
        clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
        transition: opacity 0.15s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .note {
        margin-top: 20px;
        font-size: 12px;
        color: #4f6272;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg
        class="mark"
        width="72"
        height="72"
        viewBox="0 0 86 86"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect x="8" y="8" width="70" height="70" rx="4" fill="#1C2329" />
        <rect x="18" y="18" width="9" height="50" fill="#B7C3F3" />
        <rect x="18" y="18" width="50" height="9" fill="#B7C3F3" />
        <rect x="18" y="38" width="37" height="7" fill="#ECDA90" />
        <polygon points="59,18 68,18 68,27" fill="#DD7596" />
        <polygon points="59,18 68,27 59,27" fill="#1C2329" />
        <rect
          x="18"
          y="68"
          width="50"
          height="2"
          fill="#63C5EA"
          opacity="0.55"
        />
        <rect
          x="66"
          y="29"
          width="2"
          height="39"
          fill="#9F7EBE"
          opacity="0.45"
        />
        <rect x="8" y="8" width="7" height="2" fill="#ECDA90" />
        <rect x="8" y="8" width="2" height="7" fill="#ECDA90" />
        <rect x="71" y="76" width="7" height="2" fill="#DD7596" />
        <rect x="75" y="72" width="2" height="6" fill="#DD7596" />
      </svg>
      <h1>This site has moved</h1>
      <p>Tom Fynes is now at</p>
      <span class="url">fynes-forge.github.io</span>
      <div class="progress-wrap">
        <div class="progress-bar"></div>
      </div>
      <a class="btn" href="https://fynes-forge.github.io">Go Now</a>
      <p class="note">Redirecting automatically in 5 seconds</p>
    </div>
    <script>
      setTimeout(function () {
        window.location.replace("https://fynes-forge.github.io");
      }, 5000);
    </script>
  </body>
</html>
